name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # ── Go binaries (pre-built, shared via artifact) ──────────────────────
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build Go binaries (multi-arch)
        run: |
          mkdir -p out/amd64 out/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o out/amd64/worker-go ./cmd/worker/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o out/amd64/task-go   ./cmd/task/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o out/amd64/webui     ./cmd/webui/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o out/arm64/worker-go ./cmd/worker/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o out/arm64/task-go   ./cmd/task/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o out/arm64/webui     ./cmd/webui/

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: out/

  # ── Phase 1: ai-base + moon-bridge (parallel, no deps beyond checkout) ─
  ai-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Build and push ai-base
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            -t ${PREFIX}/ai-base:latest \
            docker/base/

  moon-bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Build and push moon-bridge
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            -t ${PREFIX}/moon-bridge:latest \
            -f docker/moon-bridge/Dockerfile \
            .

  # ── Phase 2: worker-base + master-agent (parallel, FROM ai-base) ─────
  worker-base:
    needs: [go-build, ai-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: out/

      - name: Restore execute permissions
        run: chmod +x out/amd64/* out/arm64/*

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Build and push worker-base
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg BASE_IMAGE=${PREFIX}/ai-base:latest \
            -t ${PREFIX}/worker-base:latest \
            -f docker/worker-base/Dockerfile \
            .

  master-agent:
    needs: [go-build, ai-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: out/

      - name: Restore execute permissions
        run: chmod +x out/amd64/* out/arm64/*

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Build and push master-agent
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg BASE_IMAGE=${PREFIX}/ai-base:latest \
            -t ${PREFIX}/master-agent:latest \
            -f docker/master-agent/Dockerfile \
            .

  # ── Phase 3: workers (parallel, all FROM worker-base) ────────────────
  copilot:
    needs: [worker-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Get latest copilot version
        id: copilot-version
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: github/copilot-cli
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Compute copilot version
        run: |
          echo "COPILOT_VERSION=$(echo "${{ steps.copilot-version.outputs.release }}" | sed 's/^v//')" >> $GITHUB_ENV

      - name: Build and push copilot
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg WORKER_BASE_IMAGE=${PREFIX}/worker-base:latest \
            --build-arg COPILOT_VERSION=${COPILOT_VERSION} \
            -t ${PREFIX}/copilot:latest \
            -t ${PREFIX}/copilot:copilot-${COPILOT_VERSION} \
            -f docker/copilot/Dockerfile \
            .

  opencode:
    needs: [worker-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Get latest opencode version
        id: opencode-version
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: anomalyco/opencode
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Compute opencode version
        run: |
          echo "OPENCODE_VERSION=$(echo "${{ steps.opencode-version.outputs.release }}" | sed 's/^v//')" >> $GITHUB_ENV

      - name: Build and push opencode
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg WORKER_BASE_IMAGE=${PREFIX}/worker-base:latest \
            --build-arg OPENCODE_VERSION=${OPENCODE_VERSION} \
            -t ${PREFIX}/opencode:latest \
            -t ${PREFIX}/opencode:opencode-${OPENCODE_VERSION} \
            -f docker/opencode/Dockerfile \
            .

  worker-claude:
    needs: [worker-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Get latest claude version
        id: claude-version
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: anthropics/claude-code
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Compute claude version
        run: |
          echo "CLAUDE_VERSION=$(echo "${{ steps.claude-version.outputs.release }}" | sed 's/^v//')" >> $GITHUB_ENV

      - name: Build and push worker-claude
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg WORKER_BASE_IMAGE=${PREFIX}/worker-base:latest \
            --build-arg CLAUDE_VERSION=${CLAUDE_VERSION} \
            -t ${PREFIX}/worker-claude:latest \
            -t ${PREFIX}/worker-claude:claude-${CLAUDE_VERSION} \
            -f docker/worker-claude/Dockerfile \
            .

  codex:
    needs: [worker-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      - name: Get latest codex version
        id: codex-version
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: openai/codex
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Compute codex version
        run: |
          echo "CODEX_VERSION=$(echo "${{ steps.codex-version.outputs.release }}" | sed 's/^rust-v//')" >> $GITHUB_ENV

      - name: Build and push codex
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg WORKER_BASE_IMAGE=${PREFIX}/worker-base:latest \
            --build-arg CODEX_VERSION=${CODEX_VERSION} \
            -t ${PREFIX}/codex:latest \
            -t ${PREFIX}/codex:codex-${CODEX_VERSION} \
            -f docker/codex/Dockerfile \
            .
