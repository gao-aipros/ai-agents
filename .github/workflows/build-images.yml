name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Layer 0 — base image
      - name: Build ai-base
        run: |
          docker build \
            -t ai-base:latest \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/ai-base:latest \
            docker/base/

      # Layer 1 — agent base images (all depend on ai-base)
      - name: Build claude-code
        run: |
          docker build \
            -t claude-code:latest \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/claude-code:latest \
            docker/claude-code/

      - name: Build copilot
        run: |
          docker build \
            -t copilot:latest \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/copilot:latest \
            docker/copilot/

      - name: Build opencode
        run: |
          docker build \
            -t opencode:latest \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/opencode:latest \
            docker/opencode/

      # Layer 2 — agent images depending on claude-code
      - name: Build master-agent
        run: |
          docker build \
            -t master-agent:latest \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/master-agent:latest \
            docker/master-agent/

      - name: Build worker-claude
        run: |
          docker build \
            -t worker-claude:latest \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/worker-claude:latest \
            docker/worker-claude/

      # Push all images
      - name: Push images to ghcr.io
        run: |
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/ai-base:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/claude-code:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/copilot:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/opencode:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/master-agent:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/worker-claude:latest
