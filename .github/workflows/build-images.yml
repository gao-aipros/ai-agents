name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      # Layer 0 — base image (no build-arg needed, FROM debian:trixie is multi-arch on Docker Hub)
      - name: Build ai-base
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            -t ${PREFIX}/ai-base:latest \
            docker/base/

      # Layer 1 — agent base images (FROM ai-base via build-arg)
      - name: Build claude-code
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg BASE_IMAGE=${PREFIX}/ai-base:latest \
            -t ${PREFIX}/claude-code:latest \
            docker/claude-code/

      - name: Build copilot
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg BASE_IMAGE=${PREFIX}/ai-base:latest \
            -t ${PREFIX}/copilot:latest \
            docker/copilot/

      - name: Build opencode
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg BASE_IMAGE=${PREFIX}/ai-base:latest \
            -t ${PREFIX}/opencode:latest \
            docker/opencode/

      # Layer 2 — agent images depending on claude-code
      - name: Build master-agent
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg CLAUDE_IMAGE=${PREFIX}/claude-code:latest \
            -t ${PREFIX}/master-agent:latest \
            docker/master-agent/

      - name: Build worker-claude
        run: |
          docker buildx build \
            --platform ${PLATFORMS} \
            --push \
            --build-arg CLAUDE_IMAGE=${PREFIX}/claude-code:latest \
            -t ${PREFIX}/worker-claude:latest \
            docker/worker-claude/
