name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker registries require lowercase; ${{ github.repository_owner }} may have uppercase chars
      - name: Compute lowercase image prefix
        run: |
          OWNER_LC="${{ github.repository_owner }}"
          OWNER_LC="${OWNER_LC,,}"
          echo "PREFIX=${REGISTRY}/${OWNER_LC}" >> $GITHUB_ENV

      # Layer 0 — base image
      # Layer 0 — base image (other images depend on it via FROM ai-base:latest)
      - name: Build ai-base
        run: |
          docker build \
            --load \
            -t ai-base:latest \
            -t ${PREFIX}/ai-base:latest \
            docker/base/

      # Layer 1 — agent base images (all depend on ai-base)
      - name: Build claude-code
        run: |
          docker build \
            --load \
            -t claude-code:latest \
            -t ${PREFIX}/claude-code:latest \
            docker/claude-code/

      - name: Build copilot
        run: |
          docker build \
            --load \
            -t copilot:latest \
            -t ${PREFIX}/copilot:latest \
            docker/copilot/

      - name: Build opencode
        run: |
          docker build \
            --load \
            -t opencode:latest \
            -t ${PREFIX}/opencode:latest \
            docker/opencode/

      # Layer 2 — agent images depending on claude-code
      - name: Build master-agent
        run: |
          docker build \
            --load \
            -t master-agent:latest \
            -t ${PREFIX}/master-agent:latest \
            docker/master-agent/

      - name: Build worker-claude
        run: |
          docker build \
            --load \
            -t worker-claude:latest \
            -t ${PREFIX}/worker-claude:latest \
            docker/worker-claude/

      # Push all images
      - name: Push images to ghcr.io
        run: |
          docker push ${PREFIX}/ai-base:latest
          docker push ${PREFIX}/claude-code:latest
          docker push ${PREFIX}/copilot:latest
          docker push ${PREFIX}/opencode:latest
          docker push ${PREFIX}/master-agent:latest
          docker push ${PREFIX}/worker-claude:latest
