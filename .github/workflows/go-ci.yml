name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Vet
        run: go vet ./...

      - name: Build (amd64)
        run: go build ./...

      - name: Build (arm64)
        run: GOARCH=arm64 go build ./...
        # ARM64 cross-compilation verified; tests can't run without
        # a native ARM64 runner or QEMU user-mode emulation.

      - name: Test (amd64, race)
        run: go test ./... -count=1 -race
