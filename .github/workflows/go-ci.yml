name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GOARCH: ${{ matrix.goarch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 ${{ matrix.goarch == 'amd64' && '-race' || '' }}

