name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GOARCH: ${{ matrix.goarch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install redis

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 ${{ matrix.goarch == 'amd64' && '-race' || '' }}

      - name: Build Go task CLI for compat test
        run: go build -o /tmp/task ./cmd/task/

      - name: JSON compat test (Go vs Python)
        run: python3 scripts/test_json_compat.py
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          COMPAT_TEST_DB: 15
          GO_BINARY: /tmp/task
