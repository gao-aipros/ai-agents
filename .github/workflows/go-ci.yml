name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Vet
        run: GOARCH=${{ matrix.goarch }} go vet ./...

      - name: Build
        run: GOARCH=${{ matrix.goarch }} go build ./...

      - name: Test
        run: GOARCH=${{ matrix.goarch }} go test ./... -count=1 -race
