{{define "thread-history"}}
{{if .Messages}}
<div class="timeline">
{{range .Messages}}
  {{$roleClass := roleClass .Role .Type}}
  <details class="msg {{$roleClass}} type-{{.Type}}" {{if not (startCollapsed .Type)}}open{{end}}>
    <summary class="msg-meta">
      <span>{{badgeForRole .Role .Type}}</span>
      <span>{{.Timestamp}}</span>
    </summary>
    <div class="msg-content">{{.Content}}</div>
  </details>
{{end}}
</div>
{{else}}
<div class="text-center text-muted" style="padding:24px">No messages yet</div>
{{end}}
{{end}}
