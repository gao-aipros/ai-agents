{{define "thread-state"}}
{{if .Thread}}
<div class="state-panel">
  <div class="state-item">
    <div class="label">Status</div>
    <div class="value">{{statusBadge .Thread.Status}}</div>
  </div>
  <div class="state-item">
    <div class="label">Repo</div>
    <div class="value mono">{{or .Thread.GHRepo "-"}}</div>
  </div>
  <div class="state-item">
    <div class="label">PR</div>
    <div class="value mono">{{or .Thread.GHPRNumber "-"}}</div>
  </div>
  <div class="state-item">
    <div class="label">Last Design</div>
    <div class="value mono" style="font-size:12px">{{or .Thread.LastDesign "-"}}</div>
  </div>
  <div class="state-item">
    <div class="label">Updated</div>
    <div class="value mono" style="font-size:12px">{{or .Thread.UpdatedAt "-"}}</div>
  </div>
</div>
{{else}}
<div class="text-muted">Thread not found</div>
{{end}}
{{end}}
