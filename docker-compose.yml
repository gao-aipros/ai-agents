services:
  redis:
    image: redis:8.8.0-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  master:
    image: ${MASTER_AGENT_IMAGE:-master-agent:latest}
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8000}:${WEBUI_PORT:-8000}"
    volumes:
      - workspace:/workspace
      - claude_sessions:/home/agent/.claude
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "1800"
      TASK_WAIT_TIMEOUT: "2100"
      LOCK_TTL: "9300"
      WEBUI_PORT: "8000"
      WEBUI_API_KEY: ${WEBUI_API_KEY:-}
      WEBUI_POLL_DASHBOARD: "5"
      WEBUI_POLL_THREAD_DETAIL: "3"
      WEBUI_POLL_WORKERS: "5"
      WEBUI_HTMX_SRC: /static/htmx.min.js
      WEBUI_THEME: ${WEBUI_THEME:-light}
      WORKSPACE_DIR: /workspace
      CLAUDE_PATH: /usr/local/bin/claude
      CLAUDE_OUTPUT_FORMAT: stream-json
      CLAUDE_SESSIONS_DIR: /home/agent/.claude
      REQUEST_TIMEOUT: "9000"
      MAX_CONCURRENT_REQUESTS: "5"
      ANTHROPIC_AUTH_TOKEN: ${DEEPSEEK_API_KEY}
      AGENT_NAME: ${AGENT_NAME:-master}
      AGENT_ROLE: ${AGENT_ROLE:-}
      GH_TOKEN: ${MASTER_GH_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBUI_PORT:-8000}/api/health"]
      interval: 10s
      retries: 3
      start_period: 5s

  worker-claude:
    image: ${WORKER_CLAUDE_IMAGE:-worker-claude:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      WORKER_NAME: ${WORKER_CLAUDE_NAME:-claude}
      WORKER_ROLE: ${WORKER_CLAUDE_ROLE:-}
      ANTHROPIC_AUTH_TOKEN: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${WORKER_CLAUDE_GH_TOKEN}
    env_file: ".worker.env"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  worker-copilot:
    image: ${WORKER_COPILOT_IMAGE:-copilot:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      WORKER_NAME: ${WORKER_COPILOT_NAME:-copilot}
      WORKER_ROLE: ${WORKER_COPILOT_ROLE:-}
      COPILOT_PROVIDER_API_KEY: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${WORKER_COPILOT_GH_TOKEN}
    env_file: ".worker.env"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  worker-opencode:
    image: ${WORKER_OPENCODE_IMAGE:-opencode:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      WORKER_NAME: ${WORKER_OPENCODE_NAME:-opencode}
      WORKER_ROLE: ${WORKER_OPENCODE_ROLE:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${WORKER_OPENCODE_GH_TOKEN}
    env_file: ".worker.env"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  moon-bridge:
    image: ${MOON_BRIDGE_IMAGE:-moon-bridge:latest}
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:38440/v1/models"]
      interval: 10s
      retries: 3
      start_period: 5s

#  cloudflared:
#    image: cloudflare/cloudflared:latest
#    restart: unless-stopped
#    command: tunnel --no-autoupdate run
#    environment:
#      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
#    depends_on:
#      - master
#
  worker-codex:
    image: ${WORKER_CODEX_IMAGE:-codex:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      WORKER_NAME: ${WORKER_CODEX_NAME:-codex}
      WORKER_ROLE: ${WORKER_CODEX_ROLE:-}
      GH_TOKEN: ${WORKER_CODEX_GH_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      moon-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  time-db:
    image: timescale/timescaledb:latest-pg18
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - dev_db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-devadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: "autost"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  workspace:
  redis_data:
  claude_sessions:
  dev_db_data:
