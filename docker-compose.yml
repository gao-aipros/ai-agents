services:
  redis:
    image: redis:8.6.2-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  master:
    image: ${MASTER_AGENT_IMAGE:-master-agent:latest}
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8000}:8000"
    volumes:
      - workspace:/workspace
      - claude_sessions:/home/agent/.claude
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "1800"
      TASKLIB_BACKEND: ${TASKLIB_BACKEND:-go}
      WEBUI_PORT: "8000"
      WEBUI_API_KEY: ${WEBUI_API_KEY:-}
      WEBUI_POLL_DASHBOARD: "5"
      WEBUI_POLL_THREAD_DETAIL: "3"
      WEBUI_POLL_WORKERS: "5"
      WEBUI_HTMX_SRC: /static/htmx.min.js
      WEBUI_THEME: ${WEBUI_THEME:-light}
      WORKSPACE_DIR: /workspace
      CLAUDE_PATH: /usr/local/bin/claude
      CLAUDE_SESSIONS_DIR: /home/agent/.claude
      REQUEST_TIMEOUT: "1800"
      MAX_CONCURRENT_REQUESTS: "5"
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      redis:
        condition: service_healthy

  worker-claude:
    image: ${WORKER_CLAUDE_IMAGE:-worker-claude:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "1800"
      HISTORY_WINDOW: "10"
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; assert redis.Redis(host='redis').ping()"]
      interval: 30s
      retries: 3
      start_period: 10s

  worker-copilot:
    image: ${WORKER_COPILOT_IMAGE:-copilot:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "1800"
      HISTORY_WINDOW: "10"
      COPILOT_PROVIDER_API_KEY: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; assert redis.Redis(host='redis').ping()"]
      interval: 30s
      retries: 3
      start_period: 10s

  worker-opencode:
    image: ${WORKER_OPENCODE_IMAGE:-opencode:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "1800"
      HISTORY_WINDOW: "10"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; assert redis.Redis(host='redis').ping()"]
      interval: 30s
      retries: 3
      start_period: 10s

volumes:
  workspace:
    driver: local
  redis_data:
    driver: local
  claude_sessions:
    driver: local
