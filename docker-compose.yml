services:
  redis:
    image: redis:8.6.2-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  master:
    image: ${MASTER_AGENT_IMAGE:-master-agent:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
      - claude_sessions:/home/agent/.claude
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "2700"
      WEBUI_PORT: "8000"
      WEBUI_API_KEY: ${WEBUI_API_KEY:-}
      WEBUI_POLL_DASHBOARD: "5"
      WEBUI_POLL_THREAD_DETAIL: "3"
      WEBUI_POLL_WORKERS: "5"
      WEBUI_HTMX_SRC: /static/htmx.min.js
      WEBUI_THEME: ${WEBUI_THEME:-light}
      WORKSPACE_DIR: /workspace
      CLAUDE_PATH: /usr/local/bin/claude
      CLAUDE_SESSIONS_DIR: /home/agent/.claude
      REQUEST_TIMEOUT: "7200"
      MAX_CONCURRENT_REQUESTS: "5"
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      GH_TOKEN: ${MASTER_GH_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBUI_PORT:-8000}/api/health"]
      interval: 10s
      retries: 3
      start_period: 5s

  worker-claude:
    image: ${WORKER_CLAUDE_IMAGE:-worker-claude:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "2700"
      HISTORY_WINDOW: "10"
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      GH_TOKEN: ${WORKER_CLAUDE_GH_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  worker-copilot:
    image: ${WORKER_COPILOT_IMAGE:-copilot:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "2700"
      HISTORY_WINDOW: "10"
      COPILOT_PROVIDER_API_KEY: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${WORKER_COPILOT_GH_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  worker-opencode:
    image: ${WORKER_OPENCODE_IMAGE:-opencode:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "2700"
      HISTORY_WINDOW: "10"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GH_TOKEN: ${WORKER_OPENCODE_GH_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

  moon-bridge:
    image: ${MOON_BRIDGE_IMAGE:-moon-bridge:latest}
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:38440/v1/models"]
      interval: 10s
      retries: 3
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    depends_on:
      - master

  worker-codex:
    image: ${WORKER_CODEX_IMAGE:-codex:latest}
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TASK_TIMEOUT: "2700"
      HISTORY_WINDOW: "10"
      GH_TOKEN: ${WORKER_CODEX_GH_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      moon-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s

volumes:
  workspace:
  redis_data:
  claude_sessions:
