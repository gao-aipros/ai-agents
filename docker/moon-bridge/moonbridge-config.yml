mode: "Transform"

server:
  addr: "0.0.0.0:38440"

defaults:
  model: "moonbridge"
  max_tokens: 32768

models:
  deepseek-v4-pro:
    context_window: 1000000
    max_output_tokens: 32768
    display_name: "DeepSeek V4 Pro"
    supports_reasoning_summaries: false
    input_modalities: ["text"]

providers:
  deepseek:
    base_url: "https://api.deepseek.com/anthropic"
    api_key: "${DEEPSEEK_API_KEY}"
    protocol: "anthropic"
    offers:
      - model: deepseek-v4-pro
        pricing:
          input_price: 0.27
          output_price: 1.10

routes:
  moonbridge:
    model: deepseek-v4-pro
    provider: deepseek

extensions:
  deepseek_v4:
    enabled: false
